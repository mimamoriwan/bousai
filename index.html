  <meta name="theme-color" content="#FF6F00" />
  <style>
    /* Initial loading spinner colors */
    :root {
      --loader-color: #FF6F00;
      /* Mimamori WAN theme orange */
    }

    .initial-loader-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: #fcfcfc;
      font-family: sans-serif;
    }

    .initial-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 111, 0, 0.2);
      border-radius: 50%;
      border-top-color: var(--loader-color);
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .initial-loading-text {
      color: var(--loader-color);
      font-size: 1.1rem;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="initial-loader-container">
      <div class="initial-spinner"></div>
      <div class="initial-loading-text">🐾 みまもりWAN 読み込み中...</div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
