name: CI

on:
  push:
    branches:
      - main
      - 'recovery/**'
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@14.11.0

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Firebase Emulator permissions
        run: npm run test:emulator:ci
